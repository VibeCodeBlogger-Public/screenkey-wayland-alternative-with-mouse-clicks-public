# .github/workflows/release-deb.yml
# Собирает устанавливаемый двойным кликом .deb на чистой Ubuntu и публикует его в
# GitHub Release (asset keysclicks_amd64.deb — стабильное имя для прямой ссылки со скачиванием).
name: Build & release .deb

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version, e.g. 0.1.0"
        required: true
        default: "0.1.0"

permissions:
  contents: write # создать релиз + загрузить ассет

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so the build-count in the version is real & grows

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            meson ninja-build gcc gettext pkg-config dpkg-dev patchelf git \
            libgtk-4-dev libadwaita-1-dev \
            libwayland-dev wayland-protocols \
            libinput-dev libudev-dev libxkbcommon-dev libxkbregistry-dev \
            libjson-glib-dev libevdev-dev libcurl4-openssl-dev

      # gtk4-layer-shell отсутствует в репозиториях Ubuntu 24.04 → собираем shared из исходников
      # и ставим в /usr; build-deb.sh потом вложит .so в пакет + rpath (см. скрипт).
      - name: Build gtk4-layer-shell from source
        run: |
          git clone --depth 1 https://github.com/wmww/gtk4-layer-shell.git /tmp/g4ls
          cd /tmp/g4ls
          meson setup _b --prefix=/usr --buildtype=release \
            -Dexamples=false -Ddocs=false -Dtests=false -Dintrospection=false -Dvapi=false
          ninja -C _b
          sudo ninja -C _b install
          sudo ldconfig

      - name: Resolve version (3.8.<public-commit-count>, mirrors the in-app header)
        id: ver
        run: |
          COUNT="$(git rev-list --count HEAD)"
          echo "version=3.8.$COUNT" >> "$GITHUB_OUTPUT"

      - name: Build .deb
        run: bash scripts/build-deb.sh "${{ steps.ver.outputs.version }}"

      - name: Verify the .deb is self-contained (bundled layer-shell, no external dep)
        run: |
          deb="keysclicks_${{ steps.ver.outputs.version }}_amd64.deb"
          dpkg-deb -x "$deb" /tmp/x
          echo "rpath: $(patchelf --print-rpath /tmp/x/usr/bin/keysclicks)"
          test -f /tmp/x/usr/lib/keysclicks/libgtk4-layer-shell.so.0 \
            || { echo "FAIL: gtk4-layer-shell не вложен в пакет"; exit 1; }
          patchelf --print-rpath /tmp/x/usr/bin/keysclicks | grep -q '/usr/lib/keysclicks' \
            || { echo "FAIL: rpath на приватную папку не выставлен"; exit 1; }
          if dpkg-deb -f "$deb" Depends | grep -q 'layer-shell'; then
            echo "FAIL: layer-shell не должен быть внешней зависимостью (он вложен)"; exit 1
          fi
          echo "OK: gtk4-layer-shell вложен, rpath выставлен, внешней зависимости нет"

      - name: Stable-named copy for a permanent download URL
        run: cp "keysclicks_${{ steps.ver.outputs.version }}_amd64.deb" keysclicks_amd64.deb

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v${{ steps.ver.outputs.version }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" \
              "keysclicks_${{ steps.ver.outputs.version }}_amd64.deb" keysclicks_amd64.deb --clobber
          else
            gh release create "$TAG" \
              --title "On-Screen Keyboard & Mouse-Click Visualizer — Always-On-Top Overlay for Linux/Wayland (COSMIC, sway, Hyprland, KDE Plasma, wlroots) — $TAG" \
              --notes "Double-click .deb for Pop!_OS (COSMIC), Ubuntu and Debian — open it and press Install. On first launch the input reader asks for your password once (it reads libinput). Other distros: build from source (see README)." \
              "keysclicks_${{ steps.ver.outputs.version }}_amd64.deb" keysclicks_amd64.deb
          fi
