# VENDORED from the brand landing-nav source (managed centrally) — do not hand-edit.
# Canonical: brand/landing-nav/guards/nav-check.yml.tmpl in the screenkey kitchen repo.
name: nav-check
# No paths filter: runs on every push to main and every PR, so it can be a required status check
# without stuck "expected" checks on PRs that don't touch the landing (§20 — a gate must not block
# unrelated work). The check itself is a ~1s dependency-free node script, so always running is cheap.
on:
  push:
    branches: [main]
  pull_request:
permissions:
  contents: read
jobs:
  nav-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node .github/nav-check.mjs website/index.html
